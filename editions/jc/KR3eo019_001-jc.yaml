body:
  text: 卷上太素心照訣凡人六部若皆得均淨調和不絕不長不大不小不高不散各歸次位併為吉脈便知是安樂人若論根基虛實災禍各屬本位斷之假若如寸口脈不好不得祖父根基肝脈不好不得兄弟朋友子孫力腎脈不好一生無收拾奔波無衣食若無病人其脈忽然變易必然災來禍至病困臨身如有一部或來或不來者皆為鬼脈凡有災禍過去未來者亦依此推若論生克旺相禍福之期並依六十花甲子納音斷之又將寸關尺三部分為初中末三限以斷其平生休咎外年運興衰禍福無窮不能盡述略舉數事以為例在乎圓機達變之士以類而推詳診候歌日中看相貌燈下聽聲音脈與聲相似言之若吐金凡脈先取相貌次聽聲音本是貴人若得伏脈必災賤人若得貴脈必至有災害也又少年嫌伏弱老病怕洪浮男用氣為主女用血為頭診脈歌指下先須自息心浮中沉里要推尋寸關尺部分輕重豆菽纖毫義理深五行脈歌金形流利似明珠木軟長條水滑濡或大極時知是火土形和緩濁而殊金形者脈來指下分明如一點明珠一般乃是金形肺脈也木形者其脈如木梢而長弦即肝脈也水形者脈軟而滑濡內外分明即腎脈也火形者其脈一如放彈指下洪而盛似草中火發即是心脈也土形者其脈來去溫然而緩指下或似弦硬澀澀獨而純者是脾胃脈也四時脈春則肝弦心脈洪肺毛脾緩腎濡居夏當心大脾還緩肺短肝長滑似珠秋則肺浮肝卻細心勻腎弱候脾虛冬季腎沉肝止緊心脾俱緩細毛殊臟腑配十時脈肺脈寅時卯大腸辰至傳來到胃倉巳脾心午相承接未卻流行到小腸申在膀胱酉在腎戌臨焦膈亥胞當子膽醜肝傳已遍依前寅位復元鄉五陽配天干浮應庚辛滑戌巳實出壬癸甲乙弦大洪為應丙丁見此是五陽真妙言五陰配地支微憂申酉沉亥子緩主寅卯澀四季伏逢巳午更為殃五陰之脈為正例斷例歌察脈先須問五行四時相剋與相生更將表裡分明斷用意推尋生死名五行表裡要相生大抵脈全最要精定得秋冬春夏正自然下指見分明五行即金木水火土凡診脈下須存心定息然後辨認四季五行旺相逆順七表八里虛實輕重相剋相生有病無病如得旺相之脈主有喜氣春三月肝脈洪弦夏三月心脈微洪而弦秋三月肺脈毛細而弦冬三月腎脈沉微而弦是四季旺相之脈獨脾脈為四季之主每季寄旺一十八日春則弦而緩夏則洪而緩秋則毛而緩冬則沉而緩假如秋得濡弱而沉即為冬脈乃母生子也若不得見冬脈主少子也即有小災危一雲子克母主父子不和若見弦長為妻剋夫若見洪大為夫克妻主有災禍若見微沉而緩乃母生子也仍於四季月下更將急慢加之又春散秋收及夏長冬來體脈要潛藏季月之中尋胃氣卻將災福細推詳五行相貌脈五色形容看金人肺脈強更將流利斷逆順把心量陰陽相反八八男兒看反因尺中浮大寸中沉女年七七陽中盛此法推之不換金老人之脈八八六十四歲左右寸口脈浮即是順若見寸口脈而細者乃反脈也便是病女人七七四十九歲左右手尺中沉而細者即是反脈也浮則為順老人之脈老人之病脈微遲縱病連年尚可醫若然洪盛來三部命入黃泉不用疑老人須要六脈弱而微為順有病易治浮而洪大為反有病難治少年之脈少年之脈緊而剛縱遇凶殃也不妨只愁克弱來三部魂靈必定入泉鄉少壯之脈要洪大而剛有力之脈即為順有病易治若見沉細克弱之脈即為反有難治年克月年克月為災憂驚更失財若非遭重病定有哭聲哀月克年月克年為喜加官更得財子孫田宅進百福湊門來年月日和同年月日和同官高有贈封縱饒進小疾不久便亨通年月生脈平生無疾病今忽有災迍惡事須然至加年日漸臨脈生年月子孫須喜慶自己卻沉淪不用憂家業須防病失神六陽脈六脈純陽無造化尋常求事至亨通君子得之由自可小人得此是災凶六陰脈六脈純陰定靜時一生富貴少人知若還陽脈微微動不是災生死勿疑太素脈前分吉凶賦太素之脈醫家所宗非惟審病之可否殆且知人之吉凶表裡詳明獨造淵源之妙賢愚默定深窮善惡之鐘原夫人有富貴貧賤脈有陰陽虛實心和而氣舒脈各應而無戾心憂而氣喪脈亦乖而多失所遇既已或異其候自然不一故茲太素能原始以要終定爾平生須推幽而驗顯觀夫心脈洪而秀肝脈寬以弦脾脈緩而既大肺浮而且圓腎如物之墜澤命若珠之在淵急數得所兮無大無小輕重應指兮不後不前九位調勻無澀濡之惑失一生榮貴主名利之兼全是心為父母脾乃田宅之宮子孫福慶所屬肝中肺主妻妾腎同才庫惟有命門獨為壽數得力則富貴可必失位則孤貧有素脾傷於膽灼之珠玉無聞肺制於心定主鴛鴦再娶大抵凡欲審脈莫先輕易宜接三部而審九候象五行而分四時木旺則春至為喜火炎則夏來最奇夫以秋冬之應也亦應金水以言之惟五土之休旺在四季以遷移審象而推候既明則昏旦應時而定氣不失於毫釐是知散如撒砂則命必卑微聚如荊棘則心多毒害沉伏殘忍比和康泰左腎如帶土也流離堪悲脾胃若受水也孤單無奈又豈若黃冠緇布形多現於明珠象簡金章體多浮於華蓋又須按尺寸而知先後審強弱而言其盛衰寸強而富貴可必尺弱而貧賤可知若論病原請詳叔和之訣如按宗旨常稽思邈之言偉賢哉休咎雖本乎人災祥實應於脈深有妙理尤宜探索苟能深意以研窮人之禍福須詳脈理之玄機咸精白太素微論原夫天地一太極人身天地也故五行在天地間自天一生水水生木木生火火生土土生金金復生水三陰三陽所以歸根至如太玄以金木水火土五行相剋者洛書之數也河圖以相生而成洛書以相剋而成人身亦然人稟天地之氣而生五行之中隱於五臟見於六脈自腎水生肝木木生心火火生三焦相火相火生脾土脾土生肺金金復生腎水皆是相生而成且如水生木是水為母木為子土見水而克之故怒而剋水母被鬼傷子來立救相生相剋相轉無窮此乃人身之太極也故善脈者切造化之功體陰陽之理真一動之微窮萬化之實雖脈六部交應萬珠醫家七表八里九道相攻參論深切著明其書數十家至千萬氣纖細備具罔有惑焉而究所用互有得失卒有未盡其機要太始太玄之外者而不知在天地間眾人之五行在人之中一人之五行其氣有散有轉散者難以明轉者易以見古之君子於脈而有得焉平旦陽氣未盛陰氣未散飲食未進六脈調勻一舉之間而知其人平生如何富貴貧賤壽夭正邪如辨黑白如數一二心之不難無不明瞭噫此無他知於理而已故夫太素者以心為立命心君也一身之主也以小腸為遷移蓋智心之所知也以膽為福得膽乃得肝之氣為心之母心肝為官祿得天者厚也以肺為月孛父母之相初氣取自出焉以大腸為妻子得肺之氣配為初氣也以胃為財帛得胃之餘氣以脾為田宅滋養萬物者也以三焦為僕馬相火受命於心以攻之無不通者且夫心脈屬火性炎而促至不滿九用止於八乾一兌二離三震四巽五坎六良七坤八九則又為乾矣人遇之則為元陽之數孤貧無比尚何言至數之多也心主吉凶以定出身造化兼升論立初年氣數其脈浮洪指下若一數而止大人得之其心高明剛健純粹而已小人遇之其性輕躁當有盲聾之疾下元不固二數而止至性和悅心事平坦美愛敬人人當敬之達則伊傳貧則曾顏純乎君子無毫末之私也三數而止主性聰明機敏爽霽待人接物曲美盡其情文章之士忠孝之人四數而止主性躁暴不能容易持家嚴肅與人誠信心口相應急直無利己損人之心亦主聰明文章之士終未免喜怒不常五數而止主聰明機變多學多能善說辨激擺合縱橫但處不定介乎君子小人之間常有奔兢易於動搖非九流之士則遊俠之人也六數而止主性愚頑無智耕役荷擔之人或男而無謀或狠而好鬥愚夫愚婦也八數而止主性迂緩柔和容物納汗憐孤念寡輕財好德存仁弘義樂道安貧不與人交亦不欺人非君子長者之士則山林隱逸之人若更如珠之走明明淨淨則又福德深厚逍遙八極之表出乎塵俗者也肝脈主五十歲以前氣數其脈沉弦若五十而止者須位至三公承祖父餘澤四十而止者參佐之職三十而止者位止守令二十而止者雜職散官往來如珠之清利主風憲之權兼肺脈滑者主生殺之柄若佐三部至數而極者力扛九鼎位鎮一方為上將掌判生死建節閫奧割土封侯至數次者亦掌百夫之印脾胃之脈主五十歲以後晚年氣數其脈微緩得五十至者為上富三十至者為中富二十至為下富其至不及但得大體明淨亦主康裕浮而應者有財無田沉而應主有田而財浮沉俱應田財雙美若見洪緩主受祖產緩而澀者主得妻財或主妻子得力若見滑脈主不肖破家之子淫蕩之妻自身鄙不能自立乍弦乍躁主身貧困左寸之脈洪而實初得父母天地也所得者厚厚而壽所失者薄促而夭三焦洪緩心脈洪弦君臣慶會有官者遷轉無官者奇遇心脈洪緩三焦洪弦君臣失位主有異事六脈俱受母氣者主得父母之愛異於他子六脈子歸母腹主得子母憐憫幹蠱興家六脈和平兄友弟恭長幼有序設若其脈指下奔湧六部俱弦心應坎艮愚濁頑蠢則為軍賊主斬手分屍徒刑笞刺大小不定有官失賊常人官訟斯乃脈返則所主不及矣六部之中如一脈受伐一經受絕如脾部得弦長浮大者可卜其死之日以日時加之受克得母氣可求功名得子氣可求財利在乎智者之善推則萬無一失矣古者王冰所述太素定初中末主取卦行運秘訣夫太素脈者當以輕清重濁為約故輕清者為陽為富貴重濁者為陰為貧賤其卦自乾一兌二離三震四巽五坎六艮七坤八定三丸為則乾者元也男子以肝木一候間取合其卦以訣初主二十五歲以前氣數一候中取合其封以訣中主二十五歲以後氣數以定功名之高下以右關脾脈一候間取合其卦以訣初主二十五歲以前氣數一候中取合其卦以訣主五十歲以後晚年氣數以別鎡基之盛衰且如診得一數則是乾卦行運主事二十五歲二數即當兌卦行運主事二十五歲余要仿此大抵男子宜行東南震巽離坤是也在乎收斂歸藏為得其宜如男子宜行西北女子且行東南為之晦滯相背奔馳功名反復有成敗故男子即以心沉取為此身以驗德性蓋乾兌之象其性溫和寬大胸襟平垣震乃口快心直不受激觸巽離之象其性爽靈臺光霽坎艮之象其性熱毒不常每有利己損人之心坤象其性溫純有藏疾納汙之心依此參考決無差殊則如輕清之脈以指按肉純粹溫潤應指分明六脈不克若源之長澄淨之中如包藏珠玉亦無斷續縱有小疾亦無大害其清不濁為人稟性中和智識明敏祿位高權斯乃輕清之脈也重濁者應指不明如撒干砂滿指皆是前大後小息數混雜克歸本身為人性狠執毒愚滷離祖成敗不一斯乃重濁之脈也故肥壯之人脈宜沉細按之至骨瘦弱之人脈浮而大應指至骨乃為合慶女人即以肺脈沉細為出身辨驗卦數以訣德性定其生克兼以心脈考但不過反此看之是其法也候脈君子苟能精微則無施而不可矣脾部見物色有所傷脾胃弦時蒼翠色忽然洪大內為殃沉滑定是黑神祟浮澀須知白色傷凡脾得弦脈者是吃清翠所傷令人身熱體重形目疼痛腰背氣滯寒熱之病也其脈若洪大者即多內傷其脈沉細者乃是飲水所傷其脈若浮而澀者白物所傷脾部見味傷脾脈虛澀定腥膻逆沉遲滑黏膩涎緊短腌臢並硬物小虛曾被冷漿纏凡脾部脈若來虛而澀者乃腥膻物所傷而大滑而遲者是中有客涎脈短而洪緊者是醃藏硬物所傷或即冷漿等物此即令人頭痛體熱四肢虛汗骨節疼痛應此脈也心部心臟所主父母朱雀瘟司公司心化火主血為父母為帝王其藏主少陰經其腑小腸手太陽經應於舌朝於少衝穴為井在神為朱雀為瘟司位在己午方其脈本浮洪若來急數則為逆逆則為憂主父母不安公事有驚口舌官司至病主身熱口渴飲水頭疼睡臥不安小便赤熱淋閉臟腑脈心本浮洪而實沉則為賊夏旺冬絕主人性急小腸脈本微洪而浮夏旺冬絕主人性巧五陰五陽吉凶克應之日五陽浮滑實弦洪清五陰微沉緩澀伏濁浮主財庚辛日洪主子孫丙丁日滑憂病戊己日實主喜壬癸日弦平安甲乙日澀手足病辰戌醜末日微憂病申酉日緩孝服寅卯日沉水火厄亥子日伏主死厄巳午日清喜在外二八日濁憂在內三五七日已上五陽五陰論五行生剋之理仍於四時日辰上推求休囚旺相以通五臟稽及人事余加清濁二字以清為貴以濁為憂若或未明宜自少意消息性情之脈心脈頻來促為人無始終萬般皆好學到老卻成空又心脈不調勻為人多喜嗔平生常儉約利己損他人又心脈來粗大好遊並好閒平生多強會不信世艱難智惠之脈心脈柔和流利長聰明智慧足文章更看六部沉無礙出世天然不可量貴人之脈心脈分明緊秀洪此人必定位三公更尋三部俱無絕至老須持權柄雄心脈若得緊秀而洪其人必定位至三公上貴之脈須審三部九候調勻不絕有此脈其人尊貴須至將相若春夏得緊秀而洪則喜秋冬得之反為災也四營脈心部輕清應在神聰明須作廟堂人旺看甲乙無留滯二七年來貴顯榮又南方鈞脈要推詳倘若浮洪是本鄉洪大迢迢均且潤此人必定位星郎又寸脈洪秀息均勻體脈相宜是貴人春得弦洪宜在夏轉官添職喜重新喜慶之脈春得弦洪喜可裁但看初夏喜方來若非轉職並婚娶即是生兒及進財又火來金位不安全秋來加職永無逆三宜福德兼財惠為官高遷在三春又當春心脈似洪弦卻看清明後與前須見轉官多喜事脈來寬緩一生賢春脈若洪而緊者為喜此乃春木旺相之脈至四六月見喜其脈若來實緩分明是貴人之脈也又火土微沉到此年其人喜慶足文才更加洪滑時時應出入求財必得全為官進退之脈祿位先看左寸來分明流利弼天才沉沉寸口之君退廚灶移來入正臺陰陽貴賤之脈心脈純陽主有名純陰一世不聰明陽中陰見官多失陰內陽生是貴人又心脈純陽富貴全純陰貧賤不堪言陰中陽見終身富陽內陰生禍晚年又心脈勻勻指下來平平不去更無回君子加官三七見常流妻子必生災又丙丁洪絃動至關定知武職作文官若是庶人來應指必因災咎在牢關士人之脈心脈來時緊又長一生勞役費心腸若見勻洪並秀潤容儀體貌必文章貧困之脈指下輕浮又小遲一生運蹇不須疑若遇浮高與沉細要求官職定應無又粗細紛紛似撥砂心中無定意奸邪勻和不見無形狀貧賤之中定不差孤獨之脈心脈頻來息不和乖衰氣運定堪嗟為人至老常孤獨子死妻亡自主家又丙丁沉來動至微此人應是少親兒性毒沉吟多毒害求財常有鬼神隨災福之脈水來土位定知源夏末秋初定入泉若遇木來侵此位其人安樂十餘年先貧後富之脈心脈分明緩細頻先來粗澀後調勻須然今日為貧士爭奈他年作富人先富後貧之脈洪大寬緩是富人若求官職事徒為忽然突起於心部富後須貧不用疑夫心脈若得洪而大是平和之脈若寬緩而慢其人無官有財心脈突起必主先富後貧也災福之脈心脈濡弱細推之年內須憂病厄危若乃伏遲須見死分明動起莫狐疑又丙丁沉滑最堪憂官事常常也不休父母須防殘疾死少年必定走他州又丙丁濡滑更微遲得病今年莫怨誰若也似毛終是死神功千萬莫來醫又火來逢火自難猜須有憂驚更見災沉微決定災將至家中人死淚雙篩又心脈急死出公司沉細憂加父母低口舌臨身二七見但防縝密在旬幾夏見冬脈夏初用指不須深脈見浮洪是本心若還沉滑來相剋因掩無門仔細看又夏得心脈事無憂若見肝脾不用愁只怕腎來將火克冬到還須哭墓頭驚憂之脈驚憂之脈起於心散數微浮起泛沉相剋顛狂投指亂便將急慢定災臨凡脈若來撞指必主詞訟文書之事也又面部紫黃三部數狂言亂語若邪神忽然實大並帶滑險暗虛驚不悟陳又兼見性情離宮滑實不均勻性毒人兼狡詐心必是憂官刑害至若逢結脈定增驚又忽然無脈少精神須有憂疑驚更深天性細沉多毒害更知心腹似荊林心者五藏之主也其中浮而大是旺相之脈忽然無脈是心中有憂疑須見精神恍惚心脈沉細者是不順之脈主心不明之事兼腹中毒害如荊棘及有憂驚心脈順逆小腸附數七五心脈喜浮洪安知五藏通滯沉兼滑實時逆命須終弦應當無病神凝緩脈同忽然浮澀短邪氣入心中弦數應風熱微沉怯外風實長胸膈壅脈伏至陰沖微怯心還恐弦長關不從動看三十五丙丁問來縱肝部臟腑所主廟中青龍貴人肝化木主風為宰相屬臟足厥陰經其腑膽是少陽經應於眼朝於大敦穴為井在神為青龍為廟中位在寅卯方上其脈本弦來數則為逆逆則憂災六親災病貴人不喜婦人喜氣不吉病則為眼目昏痛轉筋攣縮中風癱瘓牙疼脅痛腸風下血身體麻木諸風之症臟腑脈肝脈弦長而實浮則為賊春旺秋絕主人慈善膽脈微長而芤春旺秋絕主人聰明五陰五陽吉凶克應之脈浮主厄危庚辛日洪父母進喜丙丁日滑財祿喜戊己日實子孫喜壬癸日弦兄弟喜甲乙日澀手足疾辰戌丑未日微金石厄申酉日沉血光憂亥子日緩厄難寅卯日伏子孫憂已午日清喜在外一七日濁憂在內二八日情性之脈肝膽肝輕盈平生好結情氣高當性急為主有謀成又肝膽帶輕浮為人多計謀貪花並戀酒到老越風流智惠之脈肝膽實大少清聲細緊為人定是輕更若浮高多短澀沉沉決定不分明又歲星本位厥陰經弦而自大是佳名若見浮洪並短急一生勇老燥無成貴人之脈脈來弦緩見分明須信為官顯大名更得寬長常不澀終身榮貴列公卿又要知職位膽中看弦緩分明便在肝更若緩長終是貴不為卿相即郎官肝膽之脈當弦而長其隨膽肝之衰盛若春弦而寬長並四季如此者乃肝貴之脈也又甲乙東方號歲君脈來弦緩潤長勻心神美貌多才藝三品官資是上人又甲乙來浮動更弦為人高貴有威權若還三按既無斷官高三品一生賢又四營脈肝脈輕清貴且榮堂堂相貌到公卿數逢三八應亨泰恭敬猶如日色明此脈只言輕清者是貴人之脈又甲乙本清指下浮威權志量足機謀弦長應指須為貴三品忠臣與眾殊又春來得位乃敷榮七十二日是其因戊己若來當位起求財加職一番新又木中若見水來時為事歡忻必可知居官轉職仍加祿求望亨通不用疑又少陽之位少陰中非論才高百事通忽然仕路忠言止老來須是位三公喜慶之脈肝脈由來本是弦貴人喜合益偏歡戌亥見人多利益寅卯天恩親見還又木宮得位是歡期便是長條喜應時若見火來居此位清明節至喜相隨又東方肝脈偶浮洪須是憂驚不是凶若無沉小並浮細世敦福祿最豐隆貴賤之脈要知本位當關看弦緩分明是膽肝診得弦長終是貴細沉定是主孤寒貧賤之脈肝家重濁性何如狠執無情主下愚不是脈中無貴氣奈緣精骨及頭粗難為父母肝脈弦長是本鄉如逢浮澀拜三娘若在陽中陽更起定知兩父始相當難為妻子甲乙太過細尋之行拋頭子與前妻卻有文章多學藝中年破散走東西又火來木位兩相宜便是須生異姓兒若見金來居此位其人憂事見災危陰陽逆順之脈肝脈純陽好子孫純陰孤獨克諸親陽中陰見傷男女陰內陽生旺外人災病脈春來木脈旺於肝最要洪弦指下寬若逢微澀來相剋為災春後卻難安又春得肝脈必為平脾胃相逢必定生若逢肺鬼來相剋秋見家中動哭聲又木宮木位忌金來父母須防定有災水火二位無大厄相生相順福之媒又木位看看動必遲須言災病莫狐疑頻頻舉按還無應憂散災來骨肉離又震藏本清卻滑芤破財爭訟更心憂如毛壽夭分明斷密地新郎不到頭又甲乙全然指下沉心中惑惑見災臨若逢火氣來相應婢走奴逃不用尋又甲乙如毛命不長動滑來時事可傷破財爭訟多憂險及到中年在外鄉驚憂之脈肝浮兼澀與沉遲風病如斯定莫醫尚有破財人不吉骨肉分離預可知又三部按時真是弦須知憂怒叫連天忽然浮大來無息須主憂驚事倒纏春見肺脈木位當生不是金金來侵位卻沉吟妻兒破散財無主田產拋離枉費心夏秋見肝脈夏見木位即無疑金來剋木哭妻兒木見木宮當富應喜但言三六九方知肝脈逆順膽附數六七肝脈應春弦長長細可憐短微浮澀見金剋木難全洪大旬中愈微沉滑命延緩時憂胃冷弦數主筋攣浮實雙瞳赤因風澀伏纏滑時連膽濁頭痛有風誕微緩輕虛散生花暗視難動看四十二甲乙就中扳腎部腎臟所主玄武廚庫驛馬財帛腎化水主為烈女其藏足少陰經其腑膀胱足太陽應於耳朝於湧泉穴為井在神為玄武泉神位在壬癸方其脈本沉而滑若來弦急即為逆逆則為悲主沉弱失日冗人死財散六畜驚憂其病主身寒足冷面黧腹脹腎虛腎風陰痛齒痛小便不通寤而不寐氣滯腰痛小便淋瀝陰痿作脹奔豚腹滿消渴不止小便尿血臟腑脈腎本沉細而實緩則為賊冬旺季絕主人好色膀胱本沉微而長弱主人多智惠冬旺季絕五陰五陽吉凶克應之期浮子孫喜庚辛日洪財祿丙丁日滑財喜戊己日實失脫壬癸日弦父母喜甲乙日澀破財辰戌丑未日微水厄申酉日沉主驚恐亥子日緩子憂憂寅卯日伏子孫憂巳午日清喜在外一五七日濁憂在內六八日性情之脈腎脈微而細生來多好淫貪杯能樂器難放戀花心智惠之脈主智看來是水鄉宏才大略有文章二儀尺寸來相應遲緩高昂一例詳夫看心脈柔而和分明流利相應更看腎脈流利無滯此人有大惠貴人之脈北方坎屬辰星位脈體迢迢似筯頭十萬兵權為上將名標青史定封候又北辰若得沉且長時來沉滑必軒昂非惟壽算兼才智佐國忠臣不比常凡腎脈常要沉滑而長要得此脈才主多智須為佐國忠若高而大乃下等人定於季月有災又羅候要向腎中尋著骨方來緊大沉眼大赤黃顴頰厚多謀足計帶黃金又尺中隱隱潤兼長福壽榮華安可當若教更得寸關並不為將相即侯王又腎部輕清智巧多聰明接物與人和清聲調暢無疑滯六六相逢貴奈何男女貴脈腎脈頻來指下勻少年仕路作官人若逢女子夫人巧定生二子盡超群喜慶之脈冬見腎脈是本位金來和合更無妨頻頻數應微生福水至天然達帝鄉又木來水位喜為先水來扶木兩相連望信只來三五至一陽生復轉官遷又腎脈經冬弦更長一生榮貴壽高強忽然緩緩來相應求財何用作經商又金水相逢是貴人木如相訪喜來春心須應貴成財物榮身得祿兩場新又元氣沉微動滑時為官必定喜遷移須臾心部寬洪應用意消停仔細推元臟之氣真元之本其脈常滑加之微動而滑者有喜若似江水須見四季有不測之災一云有如江水源流乃轉宮添喜之脈又沉得分明動又微遷官遷職事須期忽然心脈洪弦並佇看前程准有為又細微通滑利通津定是高遷壽本春寸心莫嫌洪緊並須知發祿在邊巡細微指下滯更加寸脈洪緊發祿在本月及本春得洪弦只主來年有喜若虛散主來年有災又遷移須要水中親交易之中更得成若遇醜寅並本位此時財谷有豐登又收拾金頭頻喜夢金來此位亦相生此是人定添壽福財多萬位事雙成得女人財尺脈沉微緩分明似往來忽然克年月須得女人財富貴之脈北方之脈來滑沉指下來明潤帶深此是人間長壽脈須知多壽足資金士人之脈壬癸弦長動更柔為人秀氣好風流卻有文章並道藝奈何修學不成休主妻好惡之脈腎脈純陽妻位正純陰不用𡚳媒人陰中陽見因妻富陽內生陰有外情貧賤之脈腎家重濁最無情少智多愚語笑輕此部若無清一點平生那得見榮身竊盜之脈尺部陰沉來往輕並加心脈不分明此人貧後多偷物至老常招鳥夜名為官災禍壬癸迢迢指下寬眼前見任是郎官只愁數短來無位定知難得百年歡災禍之脈水位時人數應期連枷下獄定相隨莫教土位來相剋此脈多因作是非又最忌於中三不來伏遲三按冷如灰獄訟此生難解釋戊己教君退大財又壬癸之中怕伏沉動澀來時病要侵若見緩時公事發浮時宅第火將臨又壬癸如逢太過時才到中年病莫疑若見細沉多巧性常流何事有三妻又三冬腎脈要潛藏指下沉沉滑不忙若被脾家侵奪位要宜仔細定災殃又來時沉澀去時微此至平生疾病拘更若沉中加動促其人難壽四旬余又根源伏遲無脈持逡巡便是死相隨若逢不及並數短得病中年不用醫又泉鬼偏宜腎里藏白膿瘟血不堪當切忌澀沉常不見患人漸次入泉鄉冬見腎脈冬見腎脈最相宜若見脾來病者悲肝脈後來侵此位相宜孫子去尋醫腎脈逆順膀胱附數六七三焦同腎脈沉兼滑隨時臟腑和太過仍緩散有疾奈之何浮澀虛邪作芤弦數實疴大洪浮脈起須病亦無多滑散兼無柰虛煩實脈差膀胱因甚熱實大見迍磨浮滯應虛久腰疼夢泄多動時看六七壬癸問前歌
