body:
  text: 卷下肺部肺臟之脈所主肺化金主氣為尚書為妻為外祖屬臟於太陰經其腑大腸手陽明經應於鼻朝於少商穴為井在神為白虎位在戌乾方其脈本浮細而澀若來太數則為逆又則為憂男主妻災女主夫災外祖不安白虎作驚孝服之事病主肺熱痰嗽身熱鼻塞肺風氣喘嘔血失聲面浮空癢皮膚燥澀息奔肺癰性情之肺肺本緊大而長洪則為賊秋旺冬絕主人多淫大腸本微緊而長秋旺夏絕主人性氣急五陰五陽吉凶克應之日浮金主財喜庚辛日洪火厄丙丁日滑水主子孫戊己日實客位喜壬癸日弦木主驚恐甲乙日澀小口喜辰戌丑未日微水手足憂申酉日沉火光病亥子日緩土災憂寅卯日濁憂在內四五日性情之肺肺緩多賓客常言濟苦貧為人多節儉損己利他人又肺脈沉不滯處世尚清閒不為僧與道終是樂溪山又肺脈沉而細稟性實溫柔為人多驚恐空懷妄想求又大腸勻動指下弦心行公正壽偏延指下浮高多強會聖賢千載不虛傳又太白星位正西方指下浮洪動體長為事平生多猛躁方知心性是豺狼又庚辛之脈見微沉為人無信只貪淫莫信見人多笑語恨無門入取人心早年及第之脈登科須要脈輕浮沉實調勻不早榮緩細分明無數大佇看金榜報佳名又三臺華蓋要須微浮短澀輕又帶虛五十動中無實大文章高折掛枝歸肺者華蓋也入水而浮脈得浮而澀是旺相之脈仍得指下輕浮得所再三按之無實大之脈方得登甲及第如沉實而大乃常脈也一云指下輕浮事不虛更若再無沉實大文章高折桂花枝貴人之脈太白金星位正西脈來浮澀不須疑中間秀潤如和順刑獄兵權甚有規又肺部輕清號秀才皮膚潤澤美恢諧看看四九名方顯武略功成踏玉階喜慶之脈金脈當秋動滑時官資必定喜遷移細看若見強長者財道同隆喜可知脈見喜肺宮原本是妻宮外祖亡家親不同浮緩輕輕皆應指庚申月主夜生人陰陽富貴貧賤肺脈純陽人宅旺純陰必定是貧人陰中陽見貧中富陽內生有貴卻貧貧賤之脈庚辛部內見弦長心性多游出外鄉數見微微當緩小離親棄婦逐時光庚辛之部見弦長少小將身出外鄉縱然不出他鄉去也是離鄉背父娘又肺脈浮來又不浮男為蕩子女孤蘇縱然得使成夫婦必須離祖外鄉居災福之脈秋來木至有災頻火來憂事亂紛紛更加金有妻宮喜喜中深喜喜無門又秋來當位見金時加官遷職運相隨莫教金受火來克不見青天也火期又肺脈分明見澀濡若當春到禍來居忽然自在秋冬得須至遷官慶有餘又肺脈常常仔細推若還洪大定災厄更看本部俱浮緩此是賢豪富貴兒災禍之脈庚辛長怕並緩弱非論多病及多迍洪緊來時須病少定知火日到黃泉又秋來微澀肺家強脈見浮洪是死鄉關內得知須緩緩更憂弦緊失家鄉又肺脈白虎不堪云食啖居堂本是迍最忌丙丁來聽哭戌乾振海不驚人又火土微沉到此年細數須知命入泉若遇大雪並小雪聖神工巧也難全又秋得肺脈忽來傳脾胃相生不用煎只怕心來無剪伐夏來棺槨里頭眠遷配之脈肺脈逢來實並弦性多剛氣使人嫌滑微清緩精詳察刑徒之脈莫流傳又庚辛動滑兩頭虛來不輕浮只緩微再三舉按都無應定是芳年已被徒肺臟逆順大腸附數五六肺臟脈輕浮平和澀短憂大洪弦曰反有病一場愁沉滑虛還愈阿阿緩不憂細弦長更緊邪退亦無憂浮實心應燥便中澀未收滑來尋實大涎唾不宜秋沉緊細且滑勞筋氣轉抽定看三十動庚與六年求脾部脾臟所主勾陳螣蛇男女產業土地土瘟土神脾化土主為大夫主男女屬臟足太陰經其腑胃足陽明經應於口朝於隱白穴為井在神為勾陳螣蛇位在乙辰巽方其脈本緩若來數大則為逆逆則為憂主土地瘟毒土神入宅作災男子不安病主脹滿泄瀉嘔吐酸水脾胃虛弱不能飲食痞塊氣痛口臭翻胃齒腫牙宣多食不飽四肢不舉癰毒瘡腫腸風下血臟腑脈脾本緩而長嗔恚則傷胃主人好善胃本緩而長憂愁則傷心主人機變正胃脈本緩而洪主人聰明好學胃本緩大而伏飢餓勞倦則傷脾主人好閒胃本緩大而數弱則賊季旺秋絕主人重厚胃本沉緩而實在命門主精與腎同性劣胃本緩而沉久坐濕地則傷胃主人輕忽五陰五陽吉凶克應浮有財喜庚辛日洪子孫喜丙丁日滑財祿主喜戊己日實兄弟喜壬癸日弦自身憂厄甲乙日微手足憂申酉日沉火炎病亥子日緩災憂寅卯日澀陰子憂辰戌丑未日伏子孫憂巳午日清喜在外五七九日濁憂在內四六八日性情之脈脾脈寬而大須為尊重人好色貪頑類更好事精神智惠之脈戊己緩澀指中寬小大非同仔細看心下為人多智惠文章須有不為官貴人之脈中宮脾脈要推詳診時洪緊又兼長塞外若不為軍王中原定作紫衣郎又脾脈平平撞指來為人高貴有文才如逢三按俱無絕官遷名位震天雷又脾脈輕輕遠慮長信誠無謅貌堂堂只看五數皆成就富貴聲名定遠揚此脈輕清者主貴端厚誠信之人也又脾脈寬緩好情懷撞指心田不可猜大小浮沉俱緩緩位高官顯碧雲才脾者土也每季寄旺一十八日其脈寬緩乃脾土旺相之脈有喜慶若來撞指顛狂主作事多虛少實心下有不可猜之事大小浮緩此得時旺相之脈主有財智須極品官也主情懷寬厚立性嚴重又財祿還須向土宮若緣不克產財豐更加息數無虧穴富貴英賢人所宗又脾脈看時寬且緩為人度量足清才忽然大小浮沉等位入高官不用猜貴賤之脈指下伏微事可嗟一生貧困事無涯勻長指下兼輕滑為官極品佐皇家喜慶之脈土運逢金氣更寬縱然無詔亦加官脈中若得逢浮滑財帛徐徐儘自寬又脾宮產業更加寬緩緩輕輕不用占戊己男宮須見喜丙丁進契亦無錢脈見福中央之脈號為脾須辨輕清及緩遲若得浮長弦更大此人衣祿主魁肥一云更若脈來朝於寸口為人能食必魁肥春見脾脈春來得位乃敷榮七十二日時其因戊己若來金位起求財加職一番新濁富之脈指下輕浮伏短沉生來慳吝畜多金忽然又澀連沉細定知邪侈與貧淫又脾家重濁主風狂無信欺人命不長縱使左心清應指也須中富不賢良此脈只言重濁貧賤之脈戊己太過細尋之少年繞路走東西九流之內非豪貴常人見此必雙妻一云若不九流三教內常人見此必雙妻又戊己不及動更徐定是離鄉別處居若見弦時必有病平生無業在詩書又戊己不及動微微遇貴中年喜並移若見弦時主痼疾讀書有祿必須遲又戊己芤時更似浮言語無憑又且粗切骨動來隨指至一生至死作奴夫脈見得失脾脈純陽求事快尋常求事至難通陰中陽見無心得陽內生陰得又空脾脈見驚中央本蒙土宮神掘井須因發此迍甲乙病人連伯進腫頭凸腹減精神脾脈逆順胃附數四七脾臟脈宜輕依依大緩平反如弦緊急長憂命必傾浮短終安愈洪長病亦醒沉弱邪不反終久得安寧洪實中消水微浮客熱並緊長脾隱隱實大困心情滑主熱皮躁牙宣口又膻動時看二十戊己閤中營命門命門所主廚司司命命門為相火主僕馬屬臟經其腑三焦經應於耳朝於穴在神為廚司司命其脈緩若來數則逆逆則為憂主官事失脫貴人不喜遷移有失廚司大驚司命大禍小人不得力病主小便赤濁大便閉結糞後出紅脫肛痔漏腸風下血腰腳痠疼左右二尺俱在下焦所主疾病大同小異性情之脈命門本沉實而微主人多壽好歡樂三焦本沉細而微洪主人多食不足奴僕好惡之脈命脈純陽奴僕好純陰一個也難留陰中陽見因他富陽內生陰見物偷二尺同斷類貴人之脈左右分明寬更長時來沉滑必高昂須知上壽居高位佐國忠臣不顯常吉慶之脈左右須看兩尺當福神更喜福無雙細看紅緊心流利剋日須知進祿鄉夫腎北方水澄則智惠生而喜至公卿者脈見於寸口在私者脈見於雙尺寸俱洪而緊者月中遇貴人見喜脈虛散者有不測之災富壽之脈尺脈須當仔細尋尺中三按忽然沉此為壽考何勞問妙決須知不換金陰陽貴賤之脈兩腎純陽是小人純陰必定是官身陰中陽見加官職陽內陰生定是軍災福之脈腎與命門寄尺中診時須要定災凶忽然浮者陽來吉長數見之命必終不宜妻妾左右尺來頻更芤與年相剋不和柔須知到老無妻妾獨守空房淚暗流不宜男女左右尺中滯又微更加脈氣又乖衰須知不利親男女必是因他外姓兒壽原善惡之脈腎與命門為類脈行年相剋內消息凡定善惡壽終但看壽與命門脈應指一同又與行年相合即斷其人生死如下文沉細定是安居終浮滑須知主富絕短伏必因沉溺水濡長終被虎狼傷結沉自己並他害澀滯須知打僕殃緊數但看遭重病蹇牢飢凍不空揚忽然短代並來滯他日須當移市場上以下並論尺脈雜斷類七表脈見吉凶浮脈三部脈俱浮胸高膽氣粗易招非橫事難得壽長途芤脈芤離鄉少居名貴本無官別處成產業陰人絕似看滑脈滑主人多智邊庭立大功不然為寇盜女傲遇逋窮實脈實見清高節謙慈好濟窮不求榮進業女弱乏良人弦脈三部脈俱弦將虛作實看若非屠劊者疑是病風顛緊脈緊為人好勝先貴有閒居富末莊園蔭相看異里同洪脈洪先人驟富往得他人財妄說門庭大婚姻不用媒八里脈見吉凶微脈三部脈俱微終身少嗣兒可為僧與道外子已榮枝沉脈三部脈俱沉兒無女眾臨都宜求側室方免晚猿吟緩脈緩須為進士官高立大功不止年齡永要仍重誥封澀脈澀須家富貴人富作偷兒平生多拗性宿疾更相隨遲脈遲為人性慢處世好奢華只恐年齡促難得長主家伏脈伏主人尊重多財卻少兒須然衣食足爭奈死來期濡脈濡脈身卻貴克子及頭妻自主成家業終身養外兒弱脈弱脈人多順高明智不高壽元尤可永勞業又何勞貴賤應形之脈有骨如無骨纖纖十指長脈看三部秀必定是候王骨軟皮膚滑紅溫更潤亮脈長當緩細榮貴顯公堂兩手無疵黑看此臂如囊脈長無滯礙富貴足倉廂兩手看還粗脈及無室居此人須不賤爭奈是愚夫骨粗皮肉澀指下冷如冰氣急脈洪大終為貧賤稱性情之脈三部脈分明為人多潔清智多並巧性為事實公平又三部脈頻滯為人性偏粗所謀多好勝處事與人殊又三部脈流利為人智惠多不知耽酒色接物與人和又脈與性相宜尊卑各異推性急脈還急性慢脈還遲又性要終身懶沉兼作事迷均勻是君子緊數是男兒貴人之脈脈來寬緩更逢春不是賢人必貴人若更洪弦來不滯須知超顯異群論又三部勻勻總亦同此名豪富勢如雄兩關溢大上朝寸應是高官金紫封定官職高下要知職位少陽看少陰不應用心觀少年金榜登高第至老人高作者官又厥陰指下盡來長少陰之部亦如常緊於辰戌寬洪至中年必定主朝堂福德之脈息數朝來不改常一生沉重位高強診時舉動藏珠伏自有洪名滿世香夫沉而隱不絕分明無澀滯更看六部勻和相應其脈安然如珠在水此人尊重兼有聲名出人表也又脈見分明是捻珠寸關尺部與常珠停勻流利知為福血氣分明仔細推僧道之脈脈見分明入水珠自然清淨降神符更看六脈勻和動福廕鄉閭與眾珠得橫人財一息寬調緩細勻更加旺相氣扶身此人須得橫財宅主起家庭慶有餘六脈見災病六脈平常指下勻微洪大遇病中寬忽然瘟也多洪盛勞憂魂夢鬼神歡又浮沉相逆脈交加脫卻紅衣著布衣禍不單行猶有福災臨門戶患無涯三部陰陽見災福三部陰陽指下同陰衰陽盛見高官忽然陰在心中旺才破官符事萬般又三部忽逢動散微陰陽俱絕見災危若也寬洪微似細應移入口進遷移又秋得浮洪冬緩微還因前得事無疑大抵災時緣短促福來三部潤勻齊三部見災害三部太過與勻長不見錢財見血光怪夢虛驚多不定分明指下細推詳三部見吉凶三部浮洪實指粗更無旺相氣相扶若非軍率並屠劊必是持刀打劫夫肝脾災福之脈陽在肝脾樂一生純陰無事也相爭陰中陽見仍長命陽內生陰壽不亨浮滑實弦洪五陽脈見災福心主財兮肝必厄脾肺財來多喜吉腎浮子孫喜氣臨此是臟腑之浮脈心脈憂病脾得財肺喜子孫肝祿位腎滑為財喜亦然此是滑中之大義心肝脈實子孫喜肝喜脾逢憂兄弟腎實失脫卻為憂此是實中之大例洪見心脾旺子孫肝逢此脈慶雙親腎部如逢財祿旺肺家遇此定災臨心脈弦時只自然肺脾遇此必憂煎肝部逢斯兄弟喜腎主雙親喜見弦微沉緩澀伏五陰脈見災福心脈微時主悶憂肝為身病未痊瘳脾為手足憂還至腎厄相從水澤求心沉須憂水火厄肝經不足子孫災脾應大光諸惡病腎至憂疑驚亦來心緩須防憂孝服肝經不測競生災肺病災憂仍防失脾則生災腎及孫心脾澀逢手足憂脾忌厄忘災孝多肝中若逢陰小去腎家財破奈如何心肺伏逢俱憂死肝家伏進子孫兼脾逢厄及子孫進腎伏前逢主憂煎貧賤之脈大體三關短伏長來時或緊去時長平生語急並身弱貧困何年是顯光左右寸脈不宜父母左右陽饒陰似絕早年母死不須論寸浮洪緊頻來促幼歲終看父不存左右關脈不宜兄弟關脈頻來指下弦更加息數不調勻須知獨立無兄弟縱有相看是外人脈見六神來式火信金財木喜情土長田宅短墳林如逢喜合知成就水病官司惡見刑又火信朱雀虎兼才土螣田宅短勾陳如逢喜合青龍位玄武官司病見刑火主信其脈燥其神為朱雀金主財其脈浮澀其神為白虎土脈長主田地其神為螣蛇脈短主墳林其神為勾陳木主喜其脈和平其神為青龍水主官訟惡事其脈散沉其神為玄武凡脈先看寸口以合五行次取尺脈要秀若得此等之脈所用有成如五行不相應尺脈有克所用無成要六脈勻和合五行相生為吉若六脈燥疾為禍亦論六神有克為災害五臟歌青龍若動榮歡至若見腎脈喜進看二字齊成朱雀文書占口舌動急主口舌緩主平和旺居白虎病多端主父母外人災螣蛇怪夢主哭聲主膀胱氣主小腸氣動在膀胱主禍連浮高主官事家人不睦喧鬧玄武旺時憂盜賊主外脫騙財小便赤澀三焦不利曉取浮沉意自然凡言臟者去取高緊動皆是也便於此位言其災福財祿喜慶也凡四時旺相脈六部要帶旺如有不見即為有病脈也寸口多強腎若沉小主傷冷浮大主熱半大半小主憂危事又主傷青翠之物傷之若無此只四肢無力百事少成多敗本部小者主傷冷眼冷淚若問大高者主有熱如春木同大者主有喜進財也或頭疼上盛之症金宜四季小主穩若盛大主孝服或發寒熱若遇水火者無子宜平穩若高大者有孝主官事春夏高同木火者主夏見財左右關脈見祟祟脈當關見家神及土官寸中如有怪功德願無還四時論脈觀氣色青憂白哭哀黑死赤多災黃色如金旺紫色候將來早觀印堂色日午看天廷夜暮察滿面長記在心經絕脈推生死年月二十一止為心中看看命不逾三月十九一止並肝逢須期半載中宵滅二十四動正腎宮一歲之間命必終動正須還於肺遇死在當年四季中末夜須看命不存代脈定生死壽根五十五動無代正壽一百二十歲欲識人命短與長惟將代脈細推詳五十不代為高壽四十五動壽中當七十以上為上壽五十為中壽三十為壽夭四十四代三十五四十二代十年強凡脈四十四動一代者其人三十五內必死四十三代其人三十四內死四十二代其人十年內必死四十一代五年內死四十動一代四年內死自四十以下寒數一動准四十日死二十一代兩歲應一十五動一歲殃十動一代看八月四動一代八朝亡以下但看三十五總得須知生死方假令腎脈三十二動一代其人三十年後至歿兩氣後五日內死滑令八十日也余仿此故症歌假會申年腎止代十投一歲分明主尺部失主鬼稱尊其人子年夏季死故之之下捲雲一歲身亡去土停便留形體四年程尺部見之方可斷更看形體察元情太素生死靈空洞中賦夫太素者通天有太易太初太素太始脈分陰陽之理察禍福之機窮天地人三才乃脈之見矣富貴論矣官高一品寸脈洪長寬大二品寸脈洪緩季三品寸脈洪弦大四品寸脈長大緩六品寸脈洪弦寬七品寸緩長寬八品寸寬弦洪九品寸弦寬大正從皆同此有官病寸洪不在有官死者寸弦小微官死不見六親寸滑浮短官遭死劫寸濡伏臟官死屍不全寸脈遲滑先官後貧寸洪滑先貧後官寸弦洪滑初為官寸洪不絕中為官寸弦不絕末為官寸洪不絕官有子無寸緩清辰官有子生旺寸洪帶弱寬辰休官為賊寸洪不死官有祖業寸緩清秀官無祖業寸實寬緩官得損財寸弦清秀官得小人財寸緊又三口不絕官得老人財寸脈緊寬官得陰人財寸洪清秀官得賊人財子動洪清為官落水死寸沉細絕退上為官棄死寸弱不明為官癰風寸促帶伏為官落馬死寸緩虛小官夜夢驚死寸短沉細遲下官軍博死寸滑在豚有官熱死寸洪大至官毒藥死寸滯沉伏為官一世無財空費精神死者寸或洪或滑沉官祿不絕寸洪寬大先富後貧寸脈緩洪先貧後富寸沉滯及弦初發寸洪滯清中發寸弦洪寬秀末發寸沉緩夫克妻多心洪大散夫克三妻心脈緊散不明妻克三夫心脈沉細未定父克子心脈滑母克子心脈微細子克父心脈洪弦大散子克母心緩平散子多不得同力心脈虛促不明子多得力心脈洪分明女多不得力心脈短明女多得力心脈長微洪主得奴婢力心緩明秀不得奴婢力心促不明得六畜旺心絃長明得兄弟力心脈分明洪秀得妻妾旺關滑分明秀得貴人財物田園六畜寸弦洪大不絕或緩大寬妾生貴子關緊寬明妻妾敗壞家門關脈伏緩妻不正關脈沉短夫妻同關先細後沉濡財物破散關脈洪弦寬疾盲關澀不秀聾耳關脈虛啞關脈伏藏癱癩關脈促急勞蠱關脈緩弱咳嗽關脈澀哮喘關脈浮瘖關脈細濡瘡癤關脈不明癰疽關脈遲狂驚關脈洪沉散不定癲癇關脈洪風病關脈滑小天行時證男女關脈短洪女子關脈虛小投河井死關脈遲浮餓死關脈急伐凍死關脈遲不見打死左關中伏不見學武死關洪大自縊死關脈絕自縊不死關弦長衣不蓋形關動不見食不充口關洪濡無足關伐投井不死關寬秀投河不死關浮遲無目禿關不定長弦折腰關洪大跛腳關浮大寬咽喉閉塞關短不明牆倒死關細不見囚禁關短枷鎖關急不明咒咀死關沉短咒咀有喜關芤不明寬秀上樹癲死身體臭關芤滑身體香關弦秀不明有官好唱關緊虛官哭關緊短官好笑關洪大長寬不惟尺脈定富貴疾症於寬洪之間而五勞七傷死者尺中亦能變見分明開解比之三命五星諸家皇極數之外六部脈大有應驗靈通之人憂愁思慮喜怒悲樂起居出入房室禍福生旺死絕春夏秋冬風寒暑濕癱癆蠱癩一切病患並皆知之有子孫為官顯達尺澀多秀長子財物豐旺尺部起秀次子為官顯達尺澀寬明次子財物豐旺尺沉寬秀為官春旺尺弦長秀為官夏旺尺弦秀明為官秋旺尺澀滑寬為官冬旺尺沉不明滑秀四季旺尺明秀為官春病尺弦緩不明夏得病尺沉不明秋得病尺促細冬得病尺弦定不明官有春死尺緩寬夏死尺伏弱秋死尺濡洪不明冬死尺浮而秀大蟲傷尺洪遲秀狗所傷尺細數狗咬死尺微細毒物傷尺滑緩不明狼所傷尺虛短蛇傷死尺實遲蛇傷不死尺沉秀鬼精靈魅尺沉不見鬼魅病不死尺浮秀瀉痢死尺沉秀痞瘧吐嘔不食死尺滑散霍亂死尺洪伏短毒藥物酒物死尺弱散婦人不下死尺浮秀六部脈寬秀為貴務要辨輕重聚明絕散若六部脈浮洪飛飛此人大熱臥不堪問六部沉沉有虛弱多為處亡鬼厥害六部俱滑命不終六部緩緩勻勻喜風疹之脈浮細推詳前脈與後脈大有神效件件無不應驗天高地遠此今世人難達古聖之智脈法於靈寶洞中源始根機哉七表脈形歌浮如指下捻蔥葉芤則中虛有兩頭滑似動珠來往利實向浮中取次求弦若爭弦時帶數緊伏琴絃作軫留洪舉百餘來極大七陽為表定其由八里脈形歌沉若爛綿尋至骨微於指下細如絲緩小於遲來往慢澀則如刀破竹皮遲重欲尋來隱隱伏潛骨重似來時濡湊指邊還怯怯弱按輕綿重不知七表八里候病歌浮風芤血滑多痰實熱弦勞緊痛間洪熱微寒臍下積沉因冷痛緩膚頑澀則傷陰並敗血又聞遲冷伏相干濡多虛汗偏宜老弱足陽虛骨體酸九道脈形狀歌迢迢長脈似持竿短脈質中不及同虛則舉尋皆不足並居寸數促無寬結脈緩時來一止代求中止不能還中實尋無按卻有水中摩石動慢慢細細極微知似線脈分九道見多般外有數脈來往速須明大脈似洪看七死脈形狀歌指下如湯湧沸時旦占夕死定無疑尾掉搖搖頭不動魚翔腎絕亦如期去疾來遲兼逼逼命絕脈來如彈石三陽谷氣久虛空胃氣分明屋諞滴散亂還同解索形髓竭骨枯見兩尺蝦游狀若蝦蟆遊魂去行屍定主憂雀啄連連來數急脾元穀氣是難留欲之心絕並榮絕如刀壓刃細推求更看肺枯並胃乏如麻戚促至無休指下渾然如轉豆三九正氣已漂流脈隨七表一里主病左寸浮傷風發熱頭痛目眩風痰逆左關脈浮主胃虛腹脹小便又難出浮大實兮目痛昏溢關頭目眩肋疼浮洪筋緩體無力浮大腸風眩癲疾尺浮膀胱風熱攻小便赤澀不須說浮緊耳聾淋秘兮浮大陰中痛不徹浮數小便頻熱淋浮風虛乏氣短訣右寸肺浮感風寒咳促鼻塞涕流長冷汗𦡴勞臥不得浮實咽燥有癰瘡浮短諸氣滑走刺浮緩不仁緊水傷關浮浮滑疾同途腹滿不食脾不蘇胃熱浮緩更不食浮實胃虛滿中憂脾干飲水食多餓在澀宿食滯氣留浮滑為飲細傷飲浮微寒熱客邪謳尺浮大腸受風熱大便秘腎數同途浮滑疣瘕主男子婦人月閉孕眉乎芤脈病證左芤吐血微衄血關緩作聲有瘀血吐血眼暗及大芤淋瀝便赤或有血右芤積血在胸中關腹暴痛主腸癰更主大便下疼血尺芤血痢下血同滑脈病證左滑心熱實大吉關滑肝熱以同疾滑散癱緩滑浮風尺滑腎熱便淋瀝血多氣少莖中疼四肢困痹痠疼跌滑弦腰腳痛難當滑弱陰中痛莫說右滑嘔逆實大熱發焦胸壅氣痰結咽乾頭痛嗽惑時頭目昏重涕唾滴關熱口臭氣喘凶粗大胃受寒變熱滑實食吃風疣臨大小不勻熱利泄尺滑實熱渴飲漿臍冰腹鳴痛利或婦人月閉和有娠弱大便閉數結熱緊脈病證左緊頭疼緊而沉心中氣逆冷痛臨關緊心腹若滿痛筋急風氣忽狂動緊實疒云癖兩尺同腰腳臍下手摩弄右緊沉滑氣實嗽關緊脅急脾痛到乾干惡盛緊腹脹憂緊滑宿食蛔吐過洪脈證左洪頭痛胸痛煩關洪肝熱遍身疼四肢浮熱及尺洪便赤腳疼難以動右洪發焦涕唾黏咽燥洪緊喘急纏關洪翻胃口干吐洪緊為脹尺洪連糞結洪大傷寒熱洪緊癰疽洪實癲微脈病證左微心虛寒熱憂心胃病結盜汗流虛勞惡寒微浮弱關微心氣鬱滿著肢急因昏尺微敗男溺女崩支白帶右微上焦寒氣痞微弱小氣中寒矣關微胃寒脹滿侵食少厥逆拘急耳尺微寒氣聚腹疼吼瀉男勞婦人門貴脈慢慢綿綿動似云陰陽俱到旺中存更逢指下多洪秀少年鄉內作夫人又清來指下秀勻勻諸官婚姻有精神若還水火皆相應當年早嫁貴官人利益夫脈脈到陰中卻見陽仔細推尋事可傷卻被父孃家業失只榮夫主一家昌壽脈陰部洪柔陰似陽丹田血海暖如湯不施紅粉如桃臉百歲冰肌溫又康難為夫陰陽脈大並來粗多應未嫁哭三夫若也動弦如急數隨人逃走外鄉居賤婦六部頻來指下寬及到陽宮木更柔此生父母須長別隨夫常在外鄉遊孤脈三部沉來指下遲但尋遲脈莫為疑三陽若見俱來斷平生一女卻無兒淫脈尺脈本沉微俄看緊數隨蘭房明月夜有客笑嘻嘻又欲識佳人一寸心關前散亂起浮沉任將山嶽為盟誓不慣幽閨獨展衾又三部弦長一寸勻須知簾下有情人陰多陽少非真潔必是揚花蕩漾春病脈室女如何脈不調只因思想自然招至今體瘦痿黃色浮洪脈盛尺微調又氣盛元來血積纏通宵叫喚不曾眼三關脈緊兼洪大榮衛都來補未宣又若得關脈候關中衛氣同風頭上攻女子只因思想患婦人多是積其風又婦人血氣不調和爭奈傷風生冷多日漸臟虛人又瘦脈中緊滑兩相磨又帶下之人尺部微沉沉細澀宛如絲論言血海多虛冷便作崩中帶下危孕脈安知有孕細推詳洪大通弦有二三右手脈洪須斷女左手脈大定知男又孕脈浮洪滑要詳須知左右定陰陽忽然安靜天生貴未到中年近帝王胎動之脈要知胎動在脈關脾緊如弦仔細看胎內嬰兒顛轉動卻令孕婦不曾安產期遠近更看產者不難知四季脾中仔細推遲更滑時知產近遲而緩者定應遲凡左右覺急而緩只須四季脾中尋之便是產中遠近來而緩者日遠近而滑者日近又三部脈洪夏日生若逢弦緩在清明脈來沉滑冬間見浮澀須知旺在庚又寸口脈來寬更緩必應秋是誕生時忽然沉滑日將近腎細須知未可期定產生死緩滑沉細定言生緊牢弦急命須傾沉細不絕方知活澀疾無調定死名寸心沉細不絕者生澀疾不調者死也
